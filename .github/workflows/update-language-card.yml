name: Update language card

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manually refreshing the language card
        required: false
        default: Refresh language card

permissions:
  contents: write

jobs:
  update-language-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/update-language-card.mjs
      - run: |
          if [ -z "$(git status --short -- assets/top-languages-by-repo.svg)" ]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/top-languages-by-repo.svg
          git commit -m "Update language card"
          git push
